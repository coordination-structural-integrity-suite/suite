<svg width="960" height="920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arw-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arw-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2dd4bf"/>
    </marker>
    <marker id="arw-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <marker id="arw-orange-sm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c" opacity="0.65"/>
    </marker>
    <marker id="arw-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="920" fill="#0d1117"/>

  <!-- ===================== ARROWS (behind nodes) ===================== -->

  <!-- 1. Axiom → Tensegrity -->
  <path d="M 395 148 C 318 188 210 198 210 218"
        stroke="#a78bfa" stroke-width="2" fill="none"
        marker-end="url(#arw-violet)"/>
  <rect x="210" y="164" width="130" height="18" rx="4" fill="#0d1117" opacity="0.8"/>
  <text x="275" y="177" fill="#7c6fb0" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">one response form</text>

  <!-- 2. Axiom → Ostrom -->
  <path d="M 567 148 C 644 188 752 198 752 218"
        stroke="#a78bfa" stroke-width="2" fill="none"
        marker-end="url(#arw-violet)"/>
  <rect x="622" y="164" width="134" height="18" rx="4" fill="#0d1117" opacity="0.8"/>
  <text x="689" y="177" fill="#7c6fb0" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">conditions required</text>

  <!-- 3. Tensegrity → Shared Language -->
  <path d="M 262 428 L 292 498"
        stroke="#2dd4bf" stroke-width="2" fill="none"
        marker-end="url(#arw-teal)"/>
  <text x="256" y="457" fill="#4b9b8e" font-size="11" font-family="system-ui,sans-serif" text-anchor="end">generates</text>

  <!-- 4. Ostrom → Shared Language -->
  <path d="M 700 428 L 670 498"
        stroke="#2dd4bf" stroke-width="2" fill="none"
        marker-end="url(#arw-teal)"/>
  <text x="706" y="457" fill="#4b9b8e" font-size="11" font-family="system-ui,sans-serif" text-anchor="start">generates</text>

  <!-- 5. Shared Language → Prevolution -->
  <path d="M 481 708 L 481 768"
        stroke="#fb923c" stroke-width="2.5" fill="none"
        marker-end="url(#arw-orange)"/>
  <rect x="494" y="726" width="106" height="16" rx="4" fill="#0d1117" opacity="0.8"/>
  <text x="547" y="738" fill="#8a5c2a" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">medium and source</text>

  <!-- 6. SL substrate → Tensegrity (dashed, upward left) -->
  <path d="M 188 588 C 94 552 62 475 194 428"
        stroke="#fb923c" stroke-width="1.5" fill="none"
        stroke-dasharray="5,4" opacity="0.75"
        marker-end="url(#arw-orange-sm)"/>
  <text x="91" y="512" fill="#6b5030" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">substrate:</text>
  <text x="91" y="525" fill="#6b5030" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">enables network</text>

  <!-- 7. SL vocabulary → Ostrom (dashed, upward right) -->
  <path d="M 772 588 C 866 552 898 475 768 428"
        stroke="#fb923c" stroke-width="1.5" fill="none"
        stroke-dasharray="5,4" opacity="0.75"
        marker-end="url(#arw-orange-sm)"/>
  <text x="869" y="512" fill="#6b5030" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">vocabulary</text>
  <text x="869" y="525" fill="#6b5030" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">for rules</text>

  <!-- ===================== NODES ===================== -->

  <!-- AXIOM -->
  <rect x="281" y="22" width="400" height="126" rx="14" fill="#13101f" stroke="#7c3aed" stroke-width="2.5"/>
  <rect x="281" y="22" width="400" height="36" rx="14" fill="#1a1130"/>
  <rect x="281" y="44" width="400" height="14" fill="#1a1130"/>
  <text x="481" y="47" fill="#a78bfa" font-size="17" font-weight="bold" font-family="system-ui,sans-serif" text-anchor="middle">Pressure-Response Axiom</text>
  <text x="481" y="72" fill="#c4b5fd" font-size="12" font-style="italic" font-family="system-ui,sans-serif" text-anchor="middle">Why do systems organize at all?</text>
  <text x="481" y="94" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Confirmed independently across physics, biology,</text>
  <text x="481" y="110" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">psychology, governance, and contemplative traditions.</text>
  <text x="481" y="135" fill="#4a3f68" font-size="10.5" font-family="system-ui,sans-serif" text-anchor="middle">The widest claim in the corpus · Axis: scope</text>

  <!-- TENSEGRITY -->
  <rect x="22" y="218" width="376" height="210" rx="14" fill="#0c1a1a" stroke="#0f766e" stroke-width="2"/>
  <rect x="22" y="218" width="376" height="36" rx="14" fill="#0d1f1f"/>
  <rect x="22" y="240" width="376" height="14" fill="#0d1f1f"/>
  <text x="210" y="244" fill="#2dd4bf" font-size="16" font-weight="bold" font-family="system-ui,sans-serif" text-anchor="middle">Tensegrity</text>
  <text x="210" y="268" fill="#5eead4" font-size="11" font-style="italic" font-family="system-ui,sans-serif" text-anchor="middle">What structural form does healthy response take?</text>
  <text x="210" y="295" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Load distribution through a tensile network.</text>
  <text x="210" y="311" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Appears across Complicated and Complex</text>
  <text x="210" y="327" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">systems of sufficient complexity.</text>
  <text x="210" y="352" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">The structural mechanics of healthy</text>
  <text x="210" y="368" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">organization.</text>
  <text x="210" y="398" fill="#194f4b" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">Axis: structural mechanics</text>
  <text x="210" y="412" fill="#194f4b" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">Scope: Complicated + Complex systems</text>

  <!-- OSTROM -->
  <rect x="562" y="218" width="376" height="210" rx="14" fill="#0c1a1a" stroke="#0f766e" stroke-width="2"/>
  <rect x="562" y="218" width="376" height="36" rx="14" fill="#0d1f1f"/>
  <rect x="562" y="240" width="376" height="14" fill="#0d1f1f"/>
  <text x="750" y="244" fill="#2dd4bf" font-size="16" font-weight="bold" font-family="system-ui,sans-serif" text-anchor="middle">Ostrom's Principles</text>
  <text x="750" y="268" fill="#5eead4" font-size="11" font-style="italic" font-family="system-ui,sans-serif" text-anchor="middle">What institutional conditions must hold?</text>
  <text x="750" y="295" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Empirical bridge from game theory to</text>
  <text x="750" y="311" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">governance design. Eight principles,</text>
  <text x="750" y="327" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">confirmed across cultures and centuries,</text>
  <text x="750" y="343" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">each with a named failure mode.</text>
  <text x="750" y="368" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">What tensegrity looks like institutionally</text>
  <text x="750" y="384" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">in human governance systems.</text>
  <text x="750" y="412" fill="#194f4b" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">Axis: institutional empirics · Scope: human governance</text>

  <!-- SHARED LANGUAGE -->
  <rect x="182" y="498" width="596" height="210" rx="14" fill="#1c1508" stroke="#b45309" stroke-width="2.5"/>
  <rect x="182" y="498" width="596" height="36" rx="14" fill="#231b0a"/>
  <rect x="182" y="520" width="596" height="14" fill="#231b0a"/>
  <text x="480" y="524" fill="#fb923c" font-size="17" font-weight="bold" font-family="system-ui,sans-serif" text-anchor="middle">Shared Language</text>
  <text x="480" y="548" fill="#fdba74" font-size="12" font-style="italic" font-family="system-ui,sans-serif" text-anchor="middle">What is the medium coordination travels through?</text>
  <text x="480" y="574" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Precondition AND product of health. Without it the tensile</text>
  <text x="480" y="590" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">network cannot form in human systems, and Ostrom's rules</text>
  <text x="480" y="606" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">have no substance to operate through. Healthy coordination</text>
  <text x="480" y="622" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">generates more of it over time.</text>
  <text x="480" y="647" fill="#5c4020" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Four bandwidth types: ontological · epistemic · pedagogical · operational</text>
  <text x="480" y="663" fill="#5c4020" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Each type constitutes a different class of coordination flow.</text>
  <text x="480" y="686" fill="#3d2a0e" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">Axis: communicative substrate · Most architecturally unusual: simultaneously precondition and product</text>

  <!-- PREVOLUTION -->
  <rect x="282" y="768" width="396" height="120" rx="14" fill="#060e1c" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="282" y="768" width="396" height="36" rx="14" fill="#08112a"/>
  <rect x="282" y="790" width="396" height="14" fill="#08112a"/>
  <text x="480" y="795" fill="#60a5fa" font-size="16" font-weight="bold" font-family="system-ui,sans-serif" text-anchor="middle">Prevolution</text>
  <text x="480" y="817" fill="#93c5fd" font-size="11" font-style="italic" font-family="system-ui,sans-serif" text-anchor="middle">What does sustained health produce over time?</text>
  <text x="480" y="840" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Proactive structural choice over reactive crisis response.</text>
  <text x="480" y="856" fill="#7d8a9e" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">The capacity to evolve deliberately rather than by forced adaptation.</text>
  <text x="480" y="876" fill="#1a2d4a" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">Axis: temporal consequence · Emerges when all five conditions are sustained together</text>

  <!-- LEGEND -->
  <line x1="282" y1="904" x2="318" y2="904" stroke="#3d4451" stroke-width="1.5"/>
  <polygon points="318,901 326,904 318,907" fill="#3d4451"/>
  <text x="330" y="908" fill="#3d4451" font-size="10" font-family="system-ui,sans-serif">primary flow</text>
  <line x1="460" y1="904" x2="496" y2="904" stroke="#3d4451" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="496,901 504,904 496,907" fill="#3d4451"/>
  <text x="508" y="908" fill="#3d4451" font-size="10" font-family="system-ui,sans-serif">substrate / reflexive</text>

</svg>
